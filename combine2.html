<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<div class="container">

<h1>Employee Salary Management System</h1>

<div class="input-row">
<input type="text" id="name" placeholder="Employee Name">
<input type="text" id="id" placeholder="Employee ID">
<input type="number" id="salary" placeholder="Salary">
</div>

<div class="input-row">
<input type="text" id="dept" placeholder="Department">
</div>

<div class="btn-row">
<button onclick="addEmployee()">Add Employee</button>
<button onclick="displayEmployees()">Display All</button>
<button onclick="filterSalary()">Salary > 50000</button>
<button onclick="totalSalary()">Total Salary</button>
<button onclick="averageSalary()">Average Salary</button>
<button onclick="countDepartment()">Count by Department</button>
</div>

<div id="result"></div>

</div>
<style>
    *{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#cfeeee;
}

.container{
width:700px;
background:#e8f6f6;
padding:30px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
}

h1{
margin-bottom:20px;
}

.input-row{
display:flex;
gap:10px;
margin-bottom:10px;
}

input{
flex:1;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

.btn-row{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
margin-top:10px;
}

button{
padding:10px 15px;
border:none;
border-radius:6px;
background:#6b8e23;
color:white;
cursor:pointer;
}

button:hover{
background:#556b2f;
}

#result{
margin-top:20px;
padding:10px;
background:white;
border-radius:6px;
min-height:50px;
border:1px solid #ccc;
}
</style>
<script>
    let employees=[];

function addEmployee(){

let name=document.getElementById("name").value;
let id=document.getElementById("id").value;
let salary=parseFloat(document.getElementById("salary").value);
let dept=document.getElementById("dept").value;

let emp={
name:name,
id:id,
salary:salary,
department:dept
};

employees.push(emp);

alert("Employee Added");

}

function displayEmployees(){

let output="";

for(let emp of employees){
output+=emp.name+" | "+emp.id+" | "+emp.salary+" | "+emp.department+"<br>";
}

document.getElementById("result").innerHTML=output;

}

function filterSalary(){

let filtered=employees.filter(emp=>emp.salary>50000);

let output="";

for(let emp of filtered){
output+=emp.name+" - "+emp.salary+"<br>";
}

document.getElementById("result").innerHTML=output;

}

function totalSalary(){

let total=0;

for(let emp of employees){
total+=emp.salary;
}

document.getElementById("result").innerHTML="Total Salary = "+total;

}

function averageSalary(){

let total=0;

for(let emp of employees){
total+=emp.salary;
}

let avg=total/employees.length;

document.getElementById("result").innerHTML="Average Salary = "+avg;

}

function countDepartment(){

let dept=prompt("Enter department name");

let count=0;

for(let emp of employees){
if(emp.department===dept){
count++;
}
}

document.getElementById("result").innerHTML="Employees in "+dept+" = "+count;

}
</script>
    
</body>
</html>
