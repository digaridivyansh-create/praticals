<!DOCTYPE html>
<html>
<head>
<style>
body{font-family:Arial;background:linear-gradient(45deg,#667eea,#764ba2);display:flex;justify-content:center;align-items:center;height:100vh;}
.box{background:white;padding:30px;border-radius:15px;text-align:center;width:350px;}
input,button{width:100%;padding:10px;margin:10px 0;}
button{background:purple;color:white;border:none;}
</style>
</head>
<body>
<div class="box">
<h2>Prime Checker</h2>
<input type="number" id="num">
<button onclick="checkPrime()">Check</button>
<h3 id="result"></h3>
</div>
<script>
function checkPrime(){
let n=document.getElementById("num").value;
let prime=true;
if(n<2) prime=false;
for(let i=2;i<n;i++){
if(n%i==0){ prime=false; break; }
}
document.getElementById("result").innerHTML=prime?"Prime":"Not Prime";
}
</script>
</body>
</html>
