<!DOCTYPE html>
<html>
<head>
<style>
body{font-family:Arial;background:linear-gradient(45deg,#ff9a9e,#fad0c4);display:flex;justify-content:center;align-items:center;height:100vh;}
.box{background:white;padding:30px;border-radius:15px;text-align:center;width:350px;}
input,button{width:100%;padding:10px;margin:10px 0;}
button{background:green;color:white;border:none;}
</style>
</head>
<body>
<div class="box">
<h2>Even Odd Checker</h2>
<input type="number" id="num">
<button onclick="check()">Check</button>
<h3 id="result"></h3>
</div>
<script>
function check(){
let n=document.getElementById("num").value;
if(n%2==0)
document.getElementById("result").innerHTML="Even";
else
document.getElementById("result").innerHTML="Odd";
}
</script>
</body>
</html>
