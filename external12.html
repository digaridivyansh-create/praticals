<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12. Countdown Timer</title>
    <style>
        body {
            background-color: #121212; color: #eeeeee; font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;
        }
        .card {
            background: #1e1e1e; padding: 2rem; border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); border-left: 4px solid #e74c3c;
            width: 100%; max-width: 400px; text-align: center;
        }
        h2 { color: #e74c3c; margin-top: 0; }
        p { color: #95a5a6; font-size: 0.9rem; }
        .input-group { display: flex; gap: 10px; margin-top: 1.5rem; }
        input {
            background: #2d2d2d; border: 1px solid #444; color: #fff;
            padding: 0.6rem; border-radius: 4px; flex: 1; outline: none;
        }
        button {
            background: #e74c3c; color: #fff; border: none;
            padding: 0.6rem 1.2rem; border-radius: 4px; cursor: pointer; font-weight: bold;
        }
        button:hover { background: #c0392b; }
        .result {
            margin-top: 1.5rem; padding: 1.5rem; background: #151515;
            border-radius: 4px; font-size: 2.5rem; font-weight: bold; font-family: monospace; color: #e74c3c;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>12. Countdown Timer</h2>
    <p>Enter a positive integer value to start the tracking timer loop down to 1.</p>
    <div class="input-group">
        <input type="number" id="timeInput" placeholder="Seconds (e.g., 10)" min="1">
        <button onclick="startCountdown()">Start</button>
    </div>
    <div class="result" id="timerBox">0</div>
</div>

<script>
    let timer;
    function startCountdown() {
        clearInterval(timer);
        let count = parseInt(document.getElementById('timeInput').value);
        let box = document.getElementById('timerBox');
        
        if (isNaN(count) || count <= 0) {
            box.style.fontSize = "1.2rem";
            box.innerText = "Enter valid seconds!";
            return;
        }
        
        box.style.fontSize = "2.5rem";
        box.innerText = count;
        
        timer = setInterval(() => {
            count--;
            if (count >= 1) {
                box.innerText = count;
            } else {
                box.style.fontSize = "1.5rem";
                box.innerText = "Time's up! (Reached 1)";
                clearInterval(timer);
            }
        }, 1000);
    }
</script>

</body>
</html>
