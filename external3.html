<!DOCTYPE html>
<html>
<head>
<style>
body{font-family:Arial;background:linear-gradient(45deg,#a18cd1,#fbc2eb);display:flex;justify-content:center;align-items:center;height:100vh;}
.box{background:white;padding:30px;border-radius:15px;text-align:center;width:350px;}
input,button{width:100%;padding:10px;margin:10px 0;}
button{background:purple;color:white;border:none;}
</style>
</head>
<body>
<div class="box">
<h2>Sum of N Numbers</h2>
<input type="number" id="num">
<button onclick="sum()">Find Sum</button>
<h3 id="result"></h3>
</div>
<script>
function sum(){
let n=document.getElementById("num").value;
let s=0;
for(let i=1;i<=n;i++) s=s+i;
document.getElementById("result").innerHTML=s;
}
</script>
</body>
</html>
